<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veteran Benefits Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f4ef;
  --white: #fff;
  --border: #d8d3cb;
  --accent: #1a3a5c;
  --accent-light: #e8eef5;
  --text: #1a1a1a;
  --muted: #7a7570;
  --user-bg: #1a3a5c;
  --bot-bg: #ffffff;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  flex-shrink: 0;
}

.avatar {
  width: 36px;
  height: 36px;
  background: var(--accent);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1rem;
}

header h1 { font-size: 1rem; font-weight: 600; }
header p { font-size: 0.78rem; color: var(--muted); }

.api-banner {
  background: var(--accent-light);
  border-bottom: 1px solid #c5d8ed;
  padding: 0.5rem 1.5rem;
  font-size: 0.78rem;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.api-banner input {
  flex: 1;
  padding: 0.3rem 0.6rem;
  border: 1px solid #c5d8ed;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  background: white;
  color: var(--text);
  max-width: 340px;
}

.api-banner input:focus { outline: none; border-color: var(--accent); }

.chat-window {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.message {
  display: flex;
  gap: 0.75rem;
  max-width: 680px;
}

.message.user {
  flex-direction: row-reverse;
  align-self: flex-end;
}

.msg-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 600;
}

.bot .msg-avatar { background: var(--accent); color: white; }
.user .msg-avatar { background: var(--border); color: var(--text); }

.msg-bubble {
  padding: 0.75rem 1rem;
  border-radius: 12px;
  font-size: 0.9rem;
  line-height: 1.6;
  max-width: 520px;
}

.bot .msg-bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-top-left-radius: 2px;
}

.user .msg-bubble {
  background: var(--user-bg);
  color: white;
  border-top-right-radius: 2px;
}

.typing {
  display: flex;
  gap: 4px;
  padding: 0.75rem 1rem;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  border-top-left-radius: 2px;
  width: fit-content;
}

.typing span {
  width: 6px;
  height: 6px;
  background: var(--muted);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-top: 0.5rem;
}

.suggestion-btn {
  background: var(--accent-light);
  color: var(--accent);
  border: 1px solid #c5d8ed;
  border-radius: 20px;
  padding: 0.35rem 0.85rem;
  font-size: 0.8rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: background 0.2s;
}

.suggestion-btn:hover { background: #d8e8f5; }

.input-area {
  background: var(--white);
  border-top: 1px solid var(--border);
  padding: 1rem 1.5rem;
  display: flex;
  gap: 0.75rem;
  flex-shrink: 0;
}

.input-area input {
  flex: 1;
  padding: 0.65rem 1rem;
  border: 1px solid var(--border);
  border-radius: 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  background: var(--bg);
  color: var(--text);
}

.input-area input:focus { outline: none; border-color: var(--accent); }

.input-area button {
  padding: 0.65rem 1.25rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}

.input-area button:hover { opacity: 0.88; }
.input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="avatar">🎖</div>
  <div>
    <h1>Veteran Benefits Assistant</h1>
    <p>Ask about VA benefits, disability ratings, GI Bill, VR&E, and more</p>
  </div>
</header>

<div class="api-banner">
  🔑 API Key:
  <input type="password" id="apiKeyInput" placeholder="Enter your Anthropic API key...">
</div>

<div class="chat-window" id="chatWindow">
  <div class="message bot">
    <div class="msg-avatar">🎖</div>
    <div>
      <div class="msg-bubble">
        Hello. I'm here to help you navigate VA benefits, disability claims, education benefits, and veteran services. What can I help you with today?
      </div>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">How do I file a disability claim?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is VR&E Chapter 31?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">How does the GI Bill work?</button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">What is TDIU?</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <input type="text" id="userInput" placeholder="Ask about VA benefits..." onkeydown="if(event.key==='Enter') sendMessage()">
  <button id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
const SYSTEM_PROMPT = `You are a knowledgeable veteran benefits assistant. You help veterans understand and navigate VA benefits including:
- Disability compensation and ratings
- GI Bill and education benefits
- Vocational Rehabilitation & Employment (VR&E / Chapter 31)
- VA healthcare enrollment
- TDIU (Total Disability Individual Unemployability)
- VA home loans
- Pension benefits
- Appeals processes

Be clear, direct, and practical. When relevant, cite specific VA programs, forms, or resources. Always recommend veterans consult with an accredited VSO (Veterans Service Organization) or VA-accredited attorney for complex claims. Keep responses concise but complete.`;

const history = [];

function getApiKey() {
  return document.getElementById('apiKeyInput').value.trim();
}

function appendMessage(role, text) {
  const window = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? '🎖' : 'You'}</div>
    <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  window.appendChild(div);
  window.scrollTop = window.scrollHeight;
  return div;
}

function showTyping() {
  const window = document.getElementById('chatWindow');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">🎖</div>
    <div class="typing"><span></span><span></span><span></span></div>
  `;
  window.appendChild(div);
  window.scrollTop = window.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function sendSuggestion(btn) {
  document.getElementById('userInput').value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    appendMessage('bot', 'Please enter your Anthropic API key above to get started.');
    return;
  }

  input.value = '';
  sendBtn.disabled = true;
  appendMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping();

    if (data.error) {
      appendMessage('bot', `Error: ${data.error.message}`);
      history.pop();
    } else {
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      appendMessage('bot', reply);
    }

  } catch (err) {
    removeTyping();
    appendMessage('bot', `Connection error: ${err.message}`);
    history.pop();
  }

  sendBtn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
