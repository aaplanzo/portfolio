<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VA Facility Finder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f4ef;
  --white: #fff;
  --border: #d8d3cb;
  --accent: #1a3a5c;
  --accent-light: #e8eef5;
  --text: #1a1a1a;
  --muted: #7a7570;
  --tag: #edeae4;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding: 2rem 1rem;
}

.container { max-width: 700px; margin: 0 auto; }

header {
  border-left: 3px solid var(--accent);
  padding-left: 1rem;
  margin-bottom: 2rem;
}

header h1 { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
header p { color: var(--muted); font-size: 0.875rem; margin-top: 0.25rem; }

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
}

.search-row {
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 0.75rem;
  align-items: end;
}

label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}

input, select {
  width: 100%;
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  background: var(--white);
  color: var(--text);
}

input:focus, select:focus { outline: none; border-color: var(--accent); }

button {
  padding: 0.65rem 1.25rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s;
}

button:hover { opacity: 0.88; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.status {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 0.75rem;
  min-height: 1.2rem;
  font-family: 'DM Mono', monospace;
}

.results { margin-top: 0.5rem; }

.facility-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.25rem 1.5rem;
  margin-bottom: 0.75rem;
  transition: border-color 0.2s;
}

.facility-card:hover { border-color: var(--accent); }

.facility-card .fac-name {
  font-size: 1rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 0.25rem;
}

.facility-card .fac-type {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.facility-card .fac-address {
  font-size: 0.875rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.facility-card .fac-services {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: 0.5rem;
}

.facility-card .fac-services span {
  background: var(--accent-light);
  color: var(--accent);
  font-size: 0.7rem;
  font-weight: 600;
  padding: 0.2rem 0.5rem;
  border-radius: 2px;
  font-family: 'DM Mono', monospace;
}

.facility-card .fac-phone {
  font-size: 0.85rem;
  color: var(--text);
  margin-top: 0.4rem;
}

.empty {
  text-align: center;
  color: var(--muted);
  padding: 2rem;
  font-size: 0.9rem;
}

.api-note {
  background: var(--accent-light);
  border: 1px solid #c5d8ed;
  border-radius: 4px;
  padding: 0.75rem 1rem;
  font-size: 0.8rem;
  color: var(--accent);
  margin-bottom: 1.25rem;
  font-family: 'DM Mono', monospace;
}

@media (max-width: 500px) {
  .search-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>VA Facility Finder</h1>
    <p>Search VA health, benefits, and cemetery facilities by state</p>
  </header>

  <div class="card">
    <div class="search-row">
      <div>
        <label for="stateSelect">State</label>
        <select id="stateSelect">
          <option value="FL">Florida</option>
          <option value="TX">Texas</option>
          <option value="CA">California</option>
          <option value="GA">Georgia</option>
          <option value="NC">North Carolina</option>
          <option value="VA">Virginia</option>
          <option value="OH">Ohio</option>
          <option value="NY">New York</option>
          <option value="WA">Washington</option>
          <option value="CO">Colorado</option>
        </select>
      </div>
      <div>
        <label for="typeSelect">Facility Type</label>
        <select id="typeSelect">
          <option value="health">Health</option>
          <option value="benefits">Benefits</option>
          <option value="cemetery">Cemetery</option>
          <option value="vet_center">Vet Center</option>
        </select>
      </div>
      <div>
        <button id="searchBtn" onclick="searchFacilities()">Search</button>
      </div>
    </div>
    <div class="status" id="status">Ready. Select a state and facility type.</div>
  </div>

  <div class="results" id="results"></div>

</div>

<script src="config.js"></script>
<script>
async function searchFacilities() {
  const state = document.getElementById('stateSelect').value;
  const type = document.getElementById('typeSelect').value;
  const btn = document.getElementById('searchBtn');
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  if (!VA_API_KEY || VA_API_KEY === 'YOUR_API_KEY_HERE') {
    status.textContent = '✗ No API key found. Add your key to config.js.';
    return;
  }

  btn.disabled = true;
  status.textContent = `Searching VA ${type} facilities in ${state}...`;
  results.innerHTML = '';

  try {
    const url = `https://sandbox-api.va.gov/services/va_facilities/v1/facilities?state=${state}&type=${type}&per_page=10`;
    const res = await fetch(url, {
      headers: { 'apiKey': VA_API_KEY, 'Accept': 'application/json' }
    });

    if (!res.ok) throw new Error(`API error: ${res.status}`);
    const data = await res.json();
    const facilities = data.data || [];

    status.textContent = `Found ${facilities.length} facilities in ${state}.`;

    if (!facilities.length) {
      results.innerHTML = '<div class="empty">No facilities found for this search.</div>';
      return;
    }

    results.innerHTML = facilities.map(f => {
      const a = f.attributes;
      const services = Object.keys(a.services || {}).slice(0, 5);
      return `
        <div class="facility-card">
          <div class="fac-name">${a.name}</div>
          <div class="fac-type">${a.facilityType?.replace(/_/g, ' ') || type}</div>
          <div class="fac-address">
            ${a.address?.physical?.address1 || ''}<br>
            ${a.address?.physical?.city || ''}, ${a.address?.physical?.state || ''} ${a.address?.physical?.zip || ''}
          </div>
          ${a.phone?.main ? `<div class="fac-phone">📞 ${a.phone.main}</div>` : ''}
          ${services.length ? `<div class="fac-services">${services.map(s => `<span>${s}</span>`).join('')}</div>` : ''}
        </div>
      `;
    }).join('');

  } catch (err) {
    status.textContent = `✗ Error: ${err.message}`;
  }

  btn.disabled = false;
}
</script>
</body>
</html>
